name: Release

# Cut a release by pushing a tag like `v1.2.3`. `workflow_dispatch` runs the
# same build matrix as a dry run (artifacts only, no GitHub Release published).
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

# Read-only by default; only the publish job is granted write (least privilege).
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  # Node 20 is removed from the runners; run JS actions on Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest, linker: gcc-aarch64-linux-gnu }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # No build cache: a release binary must not inherit a cache another branch
      # could have poisoned. Tags are infrequent, so a clean compile is cheap.
      # aarch64 linux needs a cross linker; the rest build natively.
      - name: install the cross linker
        if: matrix.linker
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker }}
      # ring assembles x86_64 asm with NASM on windows-msvc.
      - name: install NASM
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b # v1.5.2
      - name: add the target
        run: rustup target add ${{ matrix.target }}
      - name: build (release, locked)
        env:
          # Honored only by the aarch64-linux build; inert elsewhere. The CC/AR
          # vars let ring's build.rs cross-compile its C + asm for that target.
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
        run: cargo build --release --locked -p hydrate --target ${{ matrix.target }}
      # Package both binaries (hydrate + hyd) FLAT at the archive root, with a
      # SHA-256 of the archive's basename so `sha256sum -c <file>.sha256` works
      # from a downloader's cwd.
      - name: package
        shell: bash
        run: |
          set -euo pipefail
          name="hydrate-${GITHUB_REF_NAME}-${{ matrix.target }}"
          bindir="target/${{ matrix.target }}/release"
          dist="$(pwd)/dist"
          mkdir -p "$dist"
          if [ "${{ runner.os }}" = "Windows" ]; then
            base="${name}.zip"
            ( cd "$bindir" && 7z a "$dist/$base" hydrate.exe hyd.exe )
          else
            base="${name}.tar.gz"
            tar czf "$dist/$base" -C "$bindir" hydrate hyd
          fi
          ( cd "$dist"
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$base" > "$base.sha256"
            else
              shasum -a 256 "$base" > "$base.sha256"
            fi )
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    # Only a real tag publishes; a manual dispatch stops after building.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # create the release + upload assets
      id-token: write # mint the provenance attestation
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: assert the tag matches the crate version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          ver="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $ver — bump the crate version first"
            exit 1
          fi
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      # Signed build provenance for the published archives (verifiable with
      # `gh attestation verify <archive> --repo hydrate-sh/cli`).
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true

name: Release

# Cut a release by pushing a tag like `v1.2.3`. `workflow_dispatch` runs the
# same build matrix as a dry run (artifacts only, no GitHub Release published).
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

# Read-only by default; only the publish job is granted write (least privilege).
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  # Node 20 is removed from the runners; run JS actions on Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest, linker: gcc-aarch64-linux-gnu }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
      # aarch64 linux needs a cross linker; the rest build natively.
      - name: install the cross linker
        if: matrix.linker
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker }}
      - name: add the target
        run: rustup target add ${{ matrix.target }}
      - name: build (release, locked)
        env:
          # Honored only by the aarch64-linux build; harmless elsewhere.
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked -p hydrate --target ${{ matrix.target }}
      # Package both binaries (hydrate + hyd) and a SHA-256 checksum so a
      # downloader can verify the artifact.
      - name: package
        shell: bash
        run: |
          set -euo pipefail
          name="hydrate-${GITHUB_REF_NAME}-${{ matrix.target }}"
          bindir="target/${{ matrix.target }}/release"
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            archive="dist/${name}.zip"
            7z a "$archive" "./${bindir}/hydrate.exe" "./${bindir}/hyd.exe"
          else
            archive="dist/${name}.tar.gz"
            tar czf "$archive" -C "$bindir" hydrate hyd
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "${archive}.sha256"
          else
            shasum -a 256 "$archive" > "${archive}.sha256"
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    # Only a real tag publishes; a manual dispatch stops after building.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: assert the tag matches the crate version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          ver="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $ver — bump the crate version first"
            exit 1
          fi
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
